<!DOCTYPE html>
<html>

<head>

<title>CryptoBot</title>

<style>

body{
font-family:Arial;
background:#101012;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
}

#chat{
width:60%;
height:350px;
margin:auto;
margin-top:30px;
text-align:left;
overflow-y:auto;
background:#18181b;
padding:10px;
border-radius:10px;
}

input{
width:50%;
padding:12px;
border:none;
border-radius:6px;
}

button{
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#4CAF50;
color:white;
}

button:hover{
background:#45a049;
}

.message{
background:#343639;
padding:10px;
margin:10px;
border-radius:8px;
}

.user{
background:#2563eb;
}

.bot{
background:#343639;
}

pre{
white-space:pre-wrap;
}

#preview{
width:80%;
height:400px;
border:1px solid #444;
border-radius:10px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>CryptoBot</h1>

<div id="chat"></div>

<br>

<input id="msg" placeholder="Peça um site ou código...">
<button onclick="send()">Gerar</button>

<h2>Preview do Site</h2>

<iframe id="preview"></iframe>

<br><br>

<button onclick="downloadHTML()">Baixar HTML</button>

<script>

let input=document.getElementById("msg")
let lastHTML=""

// enviar com ENTER
input.addEventListener("keypress",function(e){
if(e.key==="Enter"){
send()
}
})

async function send(){

let msg=input.value.trim()

if(msg==="") return

let chat=document.getElementById("chat")

// mensagem usuário
let userDiv=document.createElement("div")
userDiv.className="message user"
userDiv.textContent="Você: "+msg
chat.appendChild(userDiv)

chat.scrollTop=chat.scrollHeight

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
})

let data=await res.json()

// resposta IA
let botDiv=document.createElement("div")
botDiv.className="message bot"

let pre=document.createElement("pre")
pre.textContent=data.reply

botDiv.appendChild(pre)

chat.appendChild(botDiv)

chat.scrollTop=chat.scrollHeight

// detectar html
if(data.reply.includes("<html") || data.reply.includes("<!DOCTYPE")){

lastHTML=data.reply

let iframe=document.getElementById("preview")

let doc=iframe.contentWindow.document
doc.open()
doc.write(lastHTML)
doc.close()

}

input.value=""

}

// baixar html
function downloadHTML(){

if(lastHTML===""){
alert("Nenhum site gerado ainda")
return
}

let blob=new Blob([lastHTML],{type:"text/html"})

let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="site.html"
a.click()

}

</script>

</body>
</html>
