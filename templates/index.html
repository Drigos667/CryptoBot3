<!DOCTYPE html>
<html>

<head>

<title>CryptoBot</title>

<style>

body{
font-family:Arial;
background:#101012;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
}

#chat{
width:60%;
height:400px;
margin:auto;
margin-top:30px;
text-align:left;
overflow-y:auto;
background:#18181b;
padding:10px;
border-radius:10px;
}

input{
width:50%;
padding:12px;
border:none;
border-radius:6px;
}

button{
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#4CAF50;
color:white;
}

button:hover{
background:#45a049;
}

.message{
background:#343639;
padding:10px;
margin:10px;
border-radius:8px;
}

.user{
background:#2563eb;
}

.bot{
background:#343639;
}

#inputArea{
margin-top:20px;
}

</style>

</head>

<body>

<h1>CryptoBot</h1>

<div id="chat"></div>

<div id="inputArea">
<input id="msg" placeholder="Peça um código...">
<button onclick="send()">Gerar</button>
</div>

<script>

let input=document.getElementById("msg")

// enviar com ENTER
input.addEventListener("keypress",function(e){
if(e.key==="Enter"){
send()
}
})

async function send(){

let msg=input.value.trim()

if(msg==="") return

let chat=document.getElementById("chat")

chat.innerHTML+=`
<div class="message user">
<b>Você:</b> ${msg}
</div>
`

chat.scrollTop=chat.scrollHeight

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
})

let data=await res.json()

chat.innerHTML+=`
<div class="message bot">
<b>IA:</b>
<pre>${data.reply}</pre>
</div>
`

chat.scrollTop=chat.scrollHeight

input.value=""

}

</script>

</body>

</html>
