<!DOCTYPE html>
<html>

<head>

<title>CryptoBot</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body{
font-family:Arial;
background:#0f0f12;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
}

#chat{
width:60%;
height:350px;
margin:auto;
margin-top:20px;
text-align:left;
overflow-y:auto;
background:#1a1a1f;
padding:10px;
border-radius:10px;
}

input{
width:50%;
padding:12px;
border:none;
border-radius:6px;
}

button{
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#4CAF50;
color:white;
}

button:hover{
background:#45a049;
}

.message{
padding:10px;
margin:10px;
border-radius:8px;
}

.user{
background:#2563eb;
}

.bot{
background:#343639;
}

pre{
white-space:pre-wrap;
}

#preview{
width:80%;
height:400px;
border:1px solid #444;
border-radius:10px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>CryptoBot</h1>

<div id="chat"></div>

<br>

<input id="msg" placeholder="Peça um site ou código...">
<button onclick="send()">Gerar</button>

<br><br>

<h2>Preview</h2>

<iframe id="preview"></iframe>

<br><br>

<button onclick="downloadProject()">Baixar Projeto</button>

<script>

let input=document.getElementById("msg")
let lastFiles={}

input.addEventListener("keypress",function(e){
if(e.key==="Enter"){
send()
}
})

async function send(){

let msg=input.value.trim()

if(msg==="") return

let chat=document.getElementById("chat")

let user=document.createElement("div")
user.className="message user"
user.textContent="Você: "+msg
chat.appendChild(user)

chat.scrollTop=chat.scrollHeight

let res=await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
})

let data=await res.json()

let bot=document.createElement("div")
bot.className="message bot"

let pre=document.createElement("pre")
pre.textContent=data.reply

bot.appendChild(pre)

chat.appendChild(bot)

chat.scrollTop=chat.scrollHeight

if(data.files){

lastFiles=data.files

let html=data.files.html || ""
let css=data.files.css || ""
let js=data.files.js || ""

let full=`
<style>${css}</style>
${html}
<script>${js}<\/script>
`

let iframe=document.getElementById("preview")

let doc=iframe.contentWindow.document

doc.open()
doc.write(full)
doc.close()

}

input.value=""

}

function downloadProject(){

if(!lastFiles.html){
alert("Nenhum site gerado ainda")
return
}

let zip=new JSZip()

zip.file("index.html", lastFiles.html)
zip.file("style.css", lastFiles.css || "")
zip.file("script.js", lastFiles.js || "")

zip.generateAsync({type:"blob"}).then(function(content){

let a=document.createElement("a")
a.href=URL.createObjectURL(content)
a.download="site.zip"
a.click()

})

}

</script>

</body>

</html>
